<style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap');

:root {
    --primary-color: #00f2fe;
    --secondary-color: #4facfe;
    --accent-color: #ff007f;
    --bg-color: #0b1120;
    --card-bg: rgba(30, 41, 59, 0.7);

}

* {

}

body {
    background-color: var(--bg-color);

    background-image: radial-gradient(circle at top right, rgba(0, 242, 254, 0.1), transparent 400px);

/* --- NAVEGACIÓN --- */
header {
     background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
    backdrop-filter: blur(10px);
    height: 80px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 5%;
    position: fixed;
    width: 100%;
    top: 0;
    z-index: 1000;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
}

.logo-container {
    font-size: 1.8rem;
    font-weight: 800;
    cursor: pointer; 
    color: white;
    display: flex;
    align-items: center;
    gap: 10px;
}

.logo-container span {
    color: var(--primary-color);
    text-shadow: 0 0 10px rgba(0, 242, 254, 0.5);
}

.header-actions {
    display: flex;
    align-items: center;
    gap: 20px;
}

.nav-links {
    display: flex;
    gap: 35px;
    align-items: center;
}

.nav-links a {
    color: white;
    text-decoration: none;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
    font-size: 1rem;
    position: relative;
}

.nav-links a::after {
    content: '';
    position: absolute;
    width: 0%;
    height: 2px;
    bottom: -5px;
    left: 0;
    background-color: var(--primary-color);
    transition: 0.3s;
}

.nav-links a:hover { color: white; }
.nav-links a:hover::after { width: 100%; }

.btn-inscribirse {
    background: linear-gradient(135deg, var(--accent-color), #ff4d4d);
    color: white;
    padding: 10px 25px;
    border-radius: 50px;
    font-weight: bold;
    border: none;
    cursor: pointer;
    box-shadow: 0 0 15px rgba(255, 0, 127, 0.4);
    transition: all 0.3s ease;
    text-decoration: none;
    font-size: 0.95rem;
}

.btn-inscribirse:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 25px rgba(255, 0, 127, 0.7);
}

.menu-btn {
    display: none;
    flex-direction: column;
    gap: 6px;
    cursor: pointer;
    z-index: 1100;
}

.menu-btn div {
    width: 35px;

    border-radius: 5px;
    transition: all 0.4s ease;
    box-shadow: 0 0 8px var(--primary-color);
}

.menu-btn.active .line1 { transform: rotate(-45deg) translate(-7px, 7px); }
.menu-btn.active .line2 { opacity: 0; transform: translateX(-20px); }
.menu-btn.active .line3 { transform: rotate(45deg) translate(-7px, -7px); }

    <script>
        // --- NAVEGACIÓN Y MENÚ ---
function toggleMenu() {
    const menuBtn = document.getElementById('menuBtn');
    const navMobile = document.getElementById('navLinksMobile');
    
    if(menuBtn && navMobile) {
        menuBtn.classList.toggle('active');
        navMobile.classList.toggle('active');
    }
}

function irA(idSeccion) {
    const secciones = document.querySelectorAll('.seccion-pagina');
    secciones.forEach(sec => sec.classList.remove('activa'));
    
    const seccionDestino = document.getElementById(idSeccion);
    if (seccionDestino) {
        seccionDestino.classList.add('activa');
    }

    const menuBtn = document.getElementById('menuBtn');
    const navMobile = document.getElementById('navLinksMobile');
    
    if (menuBtn && menuBtn.classList.contains('active')) {
        menuBtn.classList.remove('active');
        navMobile.classList.remove('active');
    }

    window.scrollTo({ top: 0, behavior: 'smooth' });
}

window.addEventListener('DOMContentLoaded', () => {
    const hash = window.location.hash.replace('#', ''); 
    if (hash) {
        setTimeout(() => { irA(hash); }, 100);
    }
});

// --- ALERTAS ---
function mostrarAlerta(texto){
    const alerta = document.getElementById("alertaCustom");
    if(alerta) {
        alerta.textContent = texto;
        alerta.style.display = "block";
        setTimeout(() => { alerta.style.display = "none"; }, 3000);
    } else {
        alert(texto); // Respaldo nativo si no existe el elemento html
    }
}

// --- WHATSAPP ---
function enviarWA() {
    const telefono = "593982792425"; // con código país
    const nombre = document.getElementById('nombre')?.value.trim();
    const edad = document.getElementById('edad')?.value.trim();
    const curso = document.getElementById('curso')?.value || "Información general";

    if(!nombre || !edad){
        mostrarAlerta("Por favor completa tu nombre y edad.");
        return;
    }

    const mensaje = `Hola equipo INNOVATIC 🚀\n\nQuiero información para inscripción:\n\nNombre: ${nombre}\nEdad: ${edad}\nCurso: ${curso}\n\n¿Podrían ayudarme con horarios y formas de pago?`;
    window.open(`https://wa.me/${telefono}?text=${encodeURIComponent(mensaje)}`, '_blank');
}

// --- RECOMENDADOR DE CURSOS ---
function recomendarCurso() {
    const edadSelect = document.getElementById("edadSelector");
    const interesSelect = document.getElementById("interesSelector");
    const resultado = document.getElementById("resultadoCurso");

    if(!edadSelect || !interesSelect || !resultado) return;

    const edad = edadSelect.value;
    const interes = interesSelect.value;

    if(!edad || !interes){
        resultado.innerHTML = "Por favor selecciona tu edad e interés.";
        return;
    }

    let recomendacion = "Te recomendamos una asesoría personalizada para elegir el mejor programa.";

    if(edad === "nino" && interes === "robotica") recomendacion = "Recomendado: Curso de Robótica Kids 🚀";
    else if(edad === "nino" && interes === "programacion") recomendacion = "Recomendado: Programación con Scratch 🖥️";
    else if(edad === "joven" && interes === "programacion") recomendacion = "Recomendado: Desarrollo Web y Lógica de Programación 💻";
    else if(edad === "joven" && interes === "diseno") recomendacion = "Recomendado: Diseño Gráfico Digital 🎨";
    else if(edad === "adulto" && interes === "ofimatica") recomendacion = "Recomendado: Ofimática Profesional y Excel 📊";
    else if(edad === "adulto" && interes === "programacion") recomendacion = "Recomendado: Programación Full Stack 💡";

    resultado.innerHTML = recomendacion;
}

// --- FAQ ACORDEÓN ---
document.querySelectorAll(".faq-question").forEach(btn => {
    btn.addEventListener("click", () => {
        const answer = btn.nextElementSibling;
        document.querySelectorAll(".faq-answer").forEach(a => {
            if(a !== answer) a.style.display = "none";
        });
        answer.style.display = answer.style.display === "block" ? "none" : "block";
    });
});

// --- FORMULARIO GOOGLE APPS SCRIPT (RESERVA DE CUPOS) ---
const URL_GOOGLE = "https://script.google.com/macros/s/AKfycbwaATzTnMdxXTacvZs9HCjfBGkiUFOtislwDqYySPyktF3McguyWPez6QmAJ5VMngQ/exec";
const formReserva = document.getElementById("formulario");
const selectHorario = document.getElementById("horario");
const modal = document.getElementById("modal");
const modalText = document.getElementById("modal-text");

async function cargarHorarios() {
    if(!selectHorario) return;
    try {
        const res = await fetch(URL_GOOGLE);
        const data = await res.json();
        
        selectHorario.innerHTML = "";
        data.forEach(h => {
            const option = document.createElement("option");
            option.value = h.horario;
            option.textContent = `${h.horario} (${h.cupos} cupos disponibles)`;
            selectHorario.appendChild(option);
        });
    } catch (e) {
        console.error("Error cargando horarios:", e);
    }
}

if (formReserva) {
    cargarHorarios();

    formReserva.addEventListener("submit", async (e) => {
        e.preventDefault();
        const data = new FormData(formReserva);
        
        modal.style.display = "flex";
        modalText.innerHTML = "Enviando información...";

        try {
            const res = await fetch(URL_GOOGLE, { method: "POST", body: data });
            const text = await res.text();

            if (text === "OK") {
                modalText.innerHTML = "✅ Se ha enviado con éxito";
                formReserva.reset();
                cargarHorarios(); 
            } else {
                modalText.innerHTML = "❌ Ese horario ya no tiene cupos";
            }
        } catch {
            modalText.innerHTML = "❌ Error al enviar";
        }

        setTimeout(() => { modal.style.display = "none"; }, 2000);
    });
}

const formContacto = document.getElementById("formRegistro");

if(formContacto) {

        try {
            const response = await fetch("https://formspree.io/f/xkoqybrl", {
                method: "POST",
                body: data,
                headers: { 'Accept': 'application/json' }
            });

            if (response.ok) {
                const modalFormspree = document.getElementById("mensajeExito");
                const loader = document.getElementById("loaderIcon");
                const check = document.getElementById("checkIcon");
                const texto = document.getElementById("textoMensaje");

                if(modalFormspree) {
                    modalFormspree.style.display = "flex";
                    loader.style.display = "block";
                    check.style.display = "none";
                    texto.textContent = "Enviando información...";

                    setTimeout(() => {
                        loader.style.display = "none";
                        check.style.display = "block";
