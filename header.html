<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InnovaTic | Reserva tu Cupo</title>
    <link rel="icon" href="icono.png?v=2" type="image/png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap');

        :root {
            --primary-color: #00f2fe;
            --secondary-color: #4facfe;
            --accent-color: #ff007f;
            --bg-color: #0b1120;
            --text-color: #f8fafc;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            overflow-x: hidden;
            background-image: radial-gradient(circle at top right, rgba(0, 242, 254, 0.1), transparent 400px);
        }

        /* --- NAVEGACIÓN --- */
        header {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            backdrop-filter: blur(10px);
            height: 80px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
        }

        .logo-img { height: 40px; cursor: pointer; }

        .nav-links { display: flex; gap: 35px; }
        .nav-links a { color: white; text-decoration: none; font-weight: 600; font-size: 1rem; }

        .btn-inscribirse {
            background: linear-gradient(135deg, var(--accent-color), #ff4d4d);
            color: white;
            padding: 10px 25px;
            border-radius: 50px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.4);
        }

        /* --- FORMULARIO --- */
        .contenedor-formulario {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 100px 20px 40px;
        }

        form {
            background: rgba(15, 23, 42, 0.8);
            padding: 30px;
            border-radius: 16px;
            width: 100%;
            max-width: 800px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 768px) {
            form { grid-template-columns: 1fr 1fr; }
            form h2, form button, .full-width { grid-column: 1 / -1; }
        }

        form h2 {
            text-align: center;
            background: linear-gradient(90deg, #22d3ee, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2rem;
        }

        .form-group { display: flex; flex-direction: column; }
        label { margin-bottom: 8px; font-size: 0.9rem; color: var(--primary-color); }

        input, select {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #020617;
            color: white;
            outline: none;
        }

        input:focus, select:focus { border-color: var(--primary-color); }

        button[type="submit"] {
            background: linear-gradient(90deg, #22d3ee, #a855f7);
            color: white;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.3s;
        }

        button:hover { transform: scale(1.02); opacity: 0.9; }

        /* --- MODAL --- */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .modal-content {
            background: #0f172a;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid var(--primary-color);
        }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary-color);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="Diseño.png" alt="Logo" class="logo-img" onclick="window.location.href='index.html'">
        </div>
        <nav class="nav-links">
            <a href="index.html">Inicio</a>
            <a href="academia.html">La Academia</a>
            <a href="cursos.html">Cursos</a>
        </nav>
        <button class="btn-inscribirse">¡Inscríbete!</button>
    </header>

    <main class="contenedor-formulario">
        <form id="formReserva">
            <h2>Reserva tu Cupo</h2>

            <div class="form-group">
                <label>Nombre del Representante:</label>
                <input type="text" name="representante" placeholder="Ej: Juan Pérez" required>
            </div>

            <div class="form-group">
                <label>Nombre del Estudiante:</label>
                <input type="text" name="estudiante" placeholder="Nombre del niño/a" required>
            </div>

            <div class="form-group">
                <label>Edad del Estudiante:</label>
                <input type="number" name="edad" required>
            </div>

            <div class="form-group">
                <label>Curso a seguir:</label>
                <select name="curso" required>
                    <option value="">Selecciona un curso</option>
                    <option value="Competencias digitales">Competencias digitales</option>
                    <option value="Programación con scratch y modulado 3D">Programación con scratch y modulado 3D</option>
                </select>
            </div>

            <div class="form-group">
                <label>Número de Celular:</label>
                <input type="tel" name="celular" maxlength="10" placeholder="09xxxxxxxx" required>
            </div>

           <div class="form-group">
    <label>Día de preferencia:</label>
    <select name="dia" id="selectDia" required>
        <option value="">Cargando días...</option>
    </select>
</div>

<div class="form-group">
    <label>Horario disponible:</label>
    <select name="horario" id="selectHorario" disabled required>
        <option value="">Selecciona primero un día</option>
    </select>
</div>

<script>
    let datosGlobales = []; // Aquí guardaremos los datos de Google
    const selectDia = document.getElementById('selectDia');
    const selectHorario = document.getElementById('selectHorario');

    // 1. Cargar todos los datos al iniciar
    async function inicializarFormulario() {
        try {
            const res = await fetch(URL_GOOGLE);
            datosGlobales = await res.json();
            
            // Obtener días únicos (Lunes, Martes, etc.)
            const diasUnicos = [...new Set(datosGlobales.map(item => item.dia))];
            
            selectDia.innerHTML = '<option value="">-- Selecciona un día --</option>';
            diasUnicos.forEach(dia => {
                const opt = document.createElement('option');
                opt.value = dia;
                opt.textContent = dia;
                selectDia.appendChild(opt);
            });
        } catch (e) {
            selectDia.innerHTML = '<option>Error al cargar</option>';
        }
    }

    // 2. Cuando cambie el día, filtrar las horas
    selectDia.addEventListener('change', () => {
        const diaSeleccionado = selectDia.value;
        
        // Limpiar y habilitar el select de horas
        selectHorario.innerHTML = '<option value="">-- Elige la hora --</option>';
        selectHorario.disabled = !diaSeleccionado;

        if (diaSeleccionado) {
            // Filtrar solo los horarios que corresponden al día elegido
            const filtrados = datosGlobales.filter(h => h.dia === diaSeleccionado);
            
            filtrados.forEach(h => {
                const opt = document.createElement('option');
                opt.value = h.hora;
                opt.textContent = `${h.hora} (${h.cupos} disponibles)`;
                selectHorario.appendChild(opt);
            });
        }
    });

    window.onload = inicializarFormulario;
</script>
