<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InnovaTic | Reserva tu Cupo</title>
    <link rel="icon" href="icono.png?v=2" type="image/png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap');

        :root {
            --primary-color: #00f2fe;
            --secondary-color: #4facfe;
            --accent-color: #ff007f;
            --bg-color: #0b1120;
            --text-color: #f8fafc;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            overflow-x: hidden;
            background-image: radial-gradient(circle at top right, rgba(0, 242, 254, 0.1), transparent 400px);
        }

        /* --- NAVEGACIÓN --- */
        header {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            backdrop-filter: blur(10px);
            height: 80px; /* Altura fija del header */
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo-container {
            display: flex;
            align-items: center;
            height: 100%; /* Para que el link ocupe el alto del header */
            text-decoration: none;
        }

        /* ESTA ES LA PARTE CLAVE PARA TU LOGO */
        .logo-img {
            height: 60px; /* Ajusta este valor si quieres el logo más grande o pequeño */
            width: auto;  /* Mantiene la proporción */
            object-fit: contain;
            display: block;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .nav-links {
            display: flex;
            gap: 25px;
            align-items: center;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: 0.3s;
            white-space: nowrap; /* Evita que el texto se parta en dos líneas */
        }

        .nav-links a:hover { opacity: 0.8; }

        .btn-inscribirse {
            background: linear-gradient(135deg, var(--accent-color), #ff4d4d);
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: bold;
            text-decoration: none;
            font-size: 0.85rem;
            box-shadow: 0 4px 15px rgba(255, 0, 127, 0.3);
            transition: 0.3s;
            white-space: nowrap;
        }

        .btn-inscribirse:hover { transform: translateY(-2px); }

        .menu-btn {
            display: none;
            flex-direction: column;
            gap: 6px;
            cursor: pointer;
        }

        .menu-btn div {
            width: 30px;
            height: 3px;
            background: white;
            border-radius: 5px;
            transition: 0.4s;
        }

        /* Ocultar menú móvil en desktop */
        .nav-links.mobile { display: none; }

        /* --- RESPONSIVE --- */
        @media (max-width: 1024px) {
            .nav-links { gap: 15px; }
            .nav-links a { font-size: 0.85rem; }
        }

        @media (max-width: 900px) {
            .nav-links { display: none; }
            .menu-btn { display: flex; }
            
            .nav-links.mobile {
                display: flex;
                position: fixed;
                right: -100%; 
                top: 0;
                width: 70%;
                height: 100vh;
                background: #0f172a;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                transition: 0.5s;
                z-index: 1050;
                gap: 30px;
            }

            .nav-links.mobile.active { right: 0; }
            .nav-links.mobile a { font-size: 1.3rem; }
        }

        /* --- SECCIÓN FORMULARIO --- */
        .contenedor-formulario {
            padding: 120px 20px 60px;
            display: flex;
            justify-content: center;
        }

        form {
            background: rgba(30, 41, 59, 0.7);
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 800px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        form h2 {
            grid-column: 1 / -1;
            text-align: center;
            margin-bottom: 20px;
            color: var(--primary-color);
        }

        .form-group { display: flex; flex-direction: column; }
        label { margin-bottom: 8px; font-size: 0.85rem; }
        input, select {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
        }

        button[type="submit"] {
            grid-column: 1 / -1;
            padding: 15px;
            background: var(--primary-color);
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        @media (max-width: 600px) {
            form { grid-template-columns: 1fr; }
        }

        /* --- MODAL --- */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .modal-content { background: #1e293b; padding: 30px; border-radius: 15px; text-align: center; }
    </style>
</head>
<body>

    <header> 
        <a href="index.html" class="logo-container">
            <img src="Diseño.png" alt="InnovaTic Logo" class="logo-img">
        </a>

        <nav class="nav-links">
            <a href="index.html">Inicio</a>
            <a href="academia.html">La Academia</a>
            <a href="cursos.html">Cursos</a>
        </nav>

        <div class="header-actions">
            <a href="header.html" class="btn-inscribirse">¡Inscríbete Hoy!</a>
            
            <div class="menu-btn" onclick="toggleMenu()">
                <div></div>
                <div></div>
                <div></div>
            </div>
        </div>

        <nav class="nav-links mobile" id="navLinksMobile">
            <a href="index.html" onclick="toggleMenu()">Inicio</a>
            <a href="academia.html" onclick="toggleMenu()">La Academia</a>
            <a href="cursos.html" onclick="toggleMenu()">Cursos</a>
        </nav>
    </header>

    <main class="contenedor-formulario">
        <form id="formReserva">
            <h2>Reserva tu Cupo</h2>
            <div class="form-group">
                <label>Nombre del Representante:</label>
                <input type="text" name="representante" required>
            </div>
            <div class="form-group">
                <label>Nombre del Estudiante:</label>
                <input type="text" name="estudiante" required>
            </div>
            <div class="form-group">
                <label>Edad:</label>
                <input type="number" name="edad" required>
            </div>
            <div class="form-group">
                <label>Curso:</label>
                <select name="curso" required>
                    <option value="">Selecciona...</option>
                    <option value="Competencias">Competencias digitales</option>
                    <option value="Scratch">Programación Scratch</option>
                </select>
            </div>
            <div class="form-group">
                <label>Celular:</label>
                <input type="tel" name="celular" maxlength="10" required>
            </div>
            <div class="form-group">
                <label>Día:</label>
                <select name="dia" id="selectDia" required>
                    <option value="">Cargando...</option>
                </select>
            </div>
            <div class="form-group">
                <label>Horario:</label>
                <select name="horario" id="selectHorario" disabled required>
                    <option value="">Selecciona día...</option>
                </select>
            </div>
            <button type="submit">📩 Enviar Información</button>
        </form>
    </main>

    <div id="modal" class="modal">
        <div class="modal-content">
            <p id="modal-text">Procesando...</p>
            <button onclick="document.getElementById('modal').style.display='none'" style="margin-top:15px;">Cerrar</button>
        </div>
    </div>

    <script>
        function toggleMenu() {
            document.getElementById('navLinksMobile').classList.toggle('active');
        }

        const URL_GOOGLE = "https://script.google.com/macros/s/AKfycbytufCF-UGyYHFGQSJCfdE1Q5Y88o64ggRPVxFw9f2p3bS6YJbLIAR635kt1f9pjgTY/exec";
        let datosGlobales = [];

        async function cargarDatos() {
            try {
                const res = await fetch(URL_GOOGLE);
                datosGlobales = await res.json();
                const dias = [...new Set(datosGlobales.map(i => i.dia))];
                const selectDia = document.getElementById('selectDia');
                selectDia.innerHTML = '<option value="">-- Selecciona --</option>';
                dias.forEach(d => {
                    let opt = document.createElement('option');
                    opt.value = d; opt.textContent = d;
                    selectDia.appendChild(opt);
                });
            } catch (e) { console.error(e); }
        }

        document.getElementById('selectDia').onchange = function() {
            const hSelect = document.getElementById('selectHorario');
            hSelect.innerHTML = '<option value="">-- Hora --</option>';
            hSelect.disabled = !this.value;
            if(this.value) {
                datosGlobales.filter(d => d.dia === this.value).forEach(h => {
                    let opt = document.createElement('option');
                    opt.value = h.hora; opt.textContent = `${h.hora} (${h.cupos} disp.)`;
                    hSelect.appendChild(opt);
                });
            }
        };

        document.getElementById('formReserva').onsubmit = async function(e) {
            e.preventDefault();
            const modal = document.getElementById('modal');
            const mText = document.getElementById('modal-text');
            modal.style.display = 'flex';
            mText.textContent = "Enviando...";

            try {
                const res = await fetch(URL_GOOGLE, { method: 'POST', body: new FormData(this) });
                const txt = await res.text();
                if(txt === "OK") {
                    mText.textContent = "✅ ¡Reserva Exitosa!";
                    this.reset();
                    cargarDatos();
                } else { mText.textContent = "❌ Sin cupos."; }
            } catch (err) { mText.textContent = "❌ Error de red."; }
        };

        window.onload = cargarDatos;
    </script>
</body>
</html>
